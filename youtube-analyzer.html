<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Analyzer (Light)</title>
    <style>
        /* 基本デザイン (ライトモード) */
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f6f9; 
            color: #333333; 
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .main-wrapper {
            width: 95%;
            max-width: 900px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 { 
            text-align: center; 
            color: #cc0000; 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: bold; 
            padding-bottom: 5px;
            border-bottom: 2px solid #e0e0e0;
        }

        /* 設定エリア */
        .settings-area {
            background: #ffffff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: flex;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        select {
            background: #f9f9f9;
            border: 1px solid #ccc;
            color: #333;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            font-size: 0.95rem;
        }

        /* 入力エリア */
        .input-container {
            flex: 0 0 150px;
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border: 1px solid #ccc;
            color: #333;
            padding: 12px;
            border-radius: 8px;
            resize: none;
            font-size: 0.95rem;
            box-sizing: border-box;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        textarea:focus { 
            outline: 2px solid #cc0000;
            border-color: #cc0000;
        }
        textarea::placeholder { color: #999; }

        /* ボタン */
        .analyze-btn {
            height: 50px;
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(204, 0, 0, 0.2);
        }
        .analyze-btn:hover { background: #a80000; }
        .analyze-btn:active { transform: translateY(1px); }

        /* 結果表示エリア */
        .result-box {
            flex: 1;
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 30px;
            font-size: 1.05rem;
            line-height: 1.8;
            color: #333;
            overflow-y: auto;
            white-space: pre-wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .result-box strong { 
            color: #cc0000;
            background: #fff0f0;
            padding: 0 4px;
            border-radius: 3px;
        }
        
        .loading { 
            color: #666; 
            font-style: italic; 
            text-align: center; 
            margin-top: 20px; 
            display: block;
        }
        
        /* エラーメッセージ用の装飾 */
        .error-msg { 
            color: #d32f2f; 
            font-weight: bold; 
            background: #ffebee;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ffcdd2;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1>YouTube Analyzer</h1>

        <div class="settings-area">
            <select id="modelSelect">
                <option value="gemini-2.5-flash">gemini-2.5-flash (推奨・高速)</option>
                <option value="gemini-2.0-flash">gemini-2.0-flash (安定・混雑回避用)</option>
                <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (軽量・超高速)</option>
                <option value="gemini-exp-1206">gemini-exp-1206 (実験版モデル)</option>
                <option value="gemini-2.5-pro">gemini-2.5-pro (高精度・重め)</option>
            </select>
        </div>

        <div class="input-container">
            <textarea id="inputText" placeholder="Glaspでコピーした文字起こし（Transcript）をここに貼り付けてください..."></textarea>
        </div>

        <button class="analyze-btn" onclick="analyzeVideo()">分析・要約を実行</button>

        <div class="result-box" id="resultBox">
            <span style="color:#888;">(ここに分析結果が表示されます)</span>
        </div>
    </div>

    <script>
        window.onload = function() {
            const savedModel = localStorage.getItem("gemini_model");
            if (savedModel) {
                document.getElementById('modelSelect').value = savedModel;
            }
        };

        document.getElementById('modelSelect').addEventListener('change', function() {
            localStorage.setItem("gemini_model", this.value);
        });

        async function analyzeVideo() {
            const text = document.getElementById('inputText').value;
            const apiKey = localStorage.getItem("gemini_api_key");
            const modelName = document.getElementById('modelSelect').value;
            const resultBox = document.getElementById('resultBox');

            const today = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

            if (!apiKey) {
                alert("APIキーが見つかりません。先に翻訳ツール(Translator)でキーを保存してください。");
                return;
            }
            if (!text) {
                alert("文字起こしテキストを貼り付けてください。");
                return;
            }

            resultBox.innerHTML = '<span class="loading">Geminiが動画の内容を精査中...<br>※現在の日付(' + today + ')を基準に分析します</span>';

            const systemInstruction = `
あなたは優秀なアシスタントです。
以下の[前提情報]に基づき、提供されたYouTube動画の文字起こし（Transcript）を要約・解説してください。

[前提情報]
**現在の日付: ${today}**

【最重要ルール：最新情報の扱いについて】
あなたの学習データ（知識）は過去のものであるため、直近のニュースや市場動向（価格の急変動など）を知らない可能性があります。
したがって、動画内で語られている「最近の出来事」や「市場価格」については、あなたの知識と異なっていても「動画の内容を最新の事実」として扱ってください。
「そのような事実は確認できない」「架空のシナリオである」といった指摘は禁止します。

【構成】
1. 📋 詳細要約
   - 動画の主旨、市場の動き、投稿者の主張を詳細に記述してください。
2. 💡 ポイント解説 & 補足
   - 専門用語の解説や、動画の背景事情を補足してください。

【出力設定】
- 言語: 日本語
- 文体: 丁寧かつ論理的に、読みやすく
            `;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

            const data = {
                contents: [{
                    parts: [{ text: `${systemInstruction}\n\n[Transcript Data]:\n${text}` }]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const json = await response.json();
                
                if (json.candidates && json.candidates[0].content) {
                    const resultText = json.candidates[0].content.parts[0].text.trim();
                    resultBox.innerText = resultText;
                } else {
                    // ★ エラー時の親切なメッセージ処理を追加
                    const errorMsg = json.error?.message || "";
                    if (errorMsg.includes("high demand") || errorMsg.includes("503")) {
                        resultBox.innerHTML = `
                            <div class="error-msg">
                                ⚠️ サーバー混雑エラー<br><br>
                                現在、選択中のモデル（${modelName}）に世界中からアクセスが集中しており、サーバーが応答できません。<br><br>
                                💡 <b>対策:</b><br>
                                上のプルダウンメニューから <b>gemini-2.0-flash</b> や <b>gemini-2.5-flash-lite</b> など、別のモデルを選択して再度お試しください。
                            </div>
                        `;
                    } else {
                        resultBox.innerHTML = `<span class="error-msg">Error: ${errorMsg || JSON.stringify(json)}</span>`;
                    }
                }

            } catch (e) {
                resultBox.innerHTML = `<span class="error-msg">通信エラーが発生しました。<br>インターネット接続を確認するか、少し待ってから再度お試しください。<br>詳細: ${e.message}</span>`;
            }
        }
    </script>
</body>
</html>
